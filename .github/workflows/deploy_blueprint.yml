name: Deploy Blueprint to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Graphviz dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            graphviz libgraphviz-dev \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-fonts-extra texlive-science texlive-pictures \
            ghostscript pdf2svg dvisvgm cm-super

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Build Lean project
        run: |
          lake exe cache get || true
          lake build :blueprint

      - name: Build Blueprint web
        run: uv run leanblueprint web

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './blueprint/web' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4